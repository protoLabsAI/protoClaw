services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: protoclaw
    hostname: sandbox

    # --- NemoClaw-inspired security ---
    security_opt:
      - no-new-privileges:true
      - seccomp=seccomp-profile.json
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    read_only: true

    # Writable mounts (tmpfs = ephemeral, wiped on restart)
    tmpfs:
      - /tmp:size=512M,uid=1001,gid=1001
      - /run:size=64M
      - /sandbox:size=256M,uid=1001,gid=1001
      - /home/sandbox:size=128M,uid=1001,gid=1001

    # Persistent volumes
    volumes:
      - protoclaw-vectors:/sandbox/memory
      - protoclaw-audit:/sandbox/audit
      - protoclaw-beads:/opt/.beads
      # Mount host Claude credentials for CLI OAuth fallback (read-only)
      # Mounted to /opt/claude-creds (not /home/sandbox) because tmpfs overwrites /home/sandbox
      - ${HOME}/.claude:/opt/claude-creds:ro

    # Expose Gradio UI
    ports:
      - "7865:7865"   # protoClaw Gradio UI
      - "7866:7866"   # OpenCode web UI

    # Network: host vLLM access
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          memory: 512M

    environment:
      - HOME=/home/sandbox
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

    stdin_open: true
    tty: true

    command: ["/opt/protoclaw/entrypoint.sh"]

volumes:
  protoclaw-vectors:
  protoclaw-audit:
  protoclaw-beads:
